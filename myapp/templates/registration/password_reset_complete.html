{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña restablecida — Observatorio Huaquechula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'myapp/CSS/style.css' %}">
    <style>
        :root {
            --color-gris-oscuro: #4A4A4A;
            --color-arena-claro: #EDEBE3;
            --color-arena-oscuro: #D6CEAA;
            --color-beige: #B3B3B3;
        }
        html, body { height: 100%; }
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            background-color: var(--color-arena-claro);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.08);
            padding: 2.75rem 2.75rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            animation: cardFadeIn 0.45s ease both;
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-logo { height: 58px; margin-bottom: 1.75rem; }

        .success-circle {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: #2e7d32;
            border: 3px solid #a5d6a7;
            animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes popIn {
            from { transform: scale(0.3); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        /* Checkmark animation */
        .checkmark-path {
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.6s 0.4s ease forwards;
        }
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        .auth-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }
        .auth-text {
            color: var(--color-gris-oscuro);
            font-size: 0.9rem;
            line-height: 1.65;
            margin-bottom: 2rem;
        }

        .countdown-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--color-arena-claro);
            border: 1.5px solid var(--color-arena-oscuro);
            border-radius: 20px;
            padding: 0.35rem 1rem;
            font-size: 0.82rem;
            color: var(--color-gris-oscuro);
            margin-bottom: 1.5rem;
        }

        .btn-auth-primary {
            width: 100%;
            height: 52px;
            border-radius: 25px;
            border: 2px solid var(--color-arena-oscuro);
            background: #fff;
            color: var(--color-gris-oscuro);
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.35s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .btn-auth-primary:hover {
            background: var(--color-gris-oscuro);
            color: #fff;
            border-color: var(--color-gris-oscuro);
        }

        @media (max-width: 480px) {
            .auth-card { padding: 2rem 1.5rem; border-radius: 16px; margin: 1rem; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="{% static 'myapp/image/logo.png' %}" alt="Logo" class="auth-logo">

        <!-- Círculo de éxito animado -->
        <div class="success-circle">
            <svg width="44" height="44" viewBox="0 0 52 52" fill="none">
                <path
                    class="checkmark-path"
                    d="M14 27 L22 35 L38 17"
                    stroke="#2e7d32"
                    stroke-width="4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    fill="none"
                />
            </svg>
        </div>

        <h1 class="auth-title">¡Contraseña actualizada!</h1>

        <p class="auth-text">
            Tu contraseña ha sido restablecida exitosamente.<br>
            Ya puedes iniciar sesión con tu <strong>nueva contraseña</strong>.
        </p>

        <!-- Contador de redirección automática -->
        <div class="countdown-chip">
            <i class="fas fa-clock"></i>
            Redirigiendo en <span id="countdown">5</span> segundos...
        </div>

        <a href="{% url 'login' %}" class="btn-auth-primary" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i>
            Ir al inicio de sesión
        </a>
    </div>

    <script>
        // Redirección automática con cuenta regresiva
        let seconds = 5;
        const display = document.getElementById('countdown');
        const interval = setInterval(() => {
            seconds--;
            if (display) display.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = "{% url 'login' %}";
            }
        }, 1000);
    </script>
</body>
</html>
