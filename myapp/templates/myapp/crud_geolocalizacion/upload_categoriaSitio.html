{% block content %}

<div class="modal fade" id="categoriaModal" tabindex="-1" aria-labelledby="tituloCategoria" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered"> <div class="modal-content">
      
      <form id="categoriaForm" method="POST" action="{% url 'crear_categoria' %}" class="needs-validation" novalidate>
        {% csrf_token %}

        <div class="modal-header custom-modal-header position-relative">
          <h5 class="modal-title w-100 text-center" id="tituloCategoria">
            <i class="fas fa-tags me-2"></i>Nueva Categoría
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
            
            <div class="mb-3">
                <label for="cat_nombre" class="form-label fw-bold">Nombre de la Categoría</label>
                <input type="text" class="form-control" 
                       id="cat_nombre" name="nombre" 
                       placeholder="Ej: Turismo Religioso" 
                       required autocomplete="off"
                       onkeyup="generarSlugAuto()">
                <div class="form-text text-muted">El nombre visible para los usuarios.</div>
            </div>

            <div class="mb-3">
                <label for="cat_slug" class="form-label fw-bold small text-uppercase">Código Slug (URL)</label>
                <div class="input-group" style="height: 38px;">
                    <span class="input-group-text bg-light" style="height: 100%; display: flex; align-items: center;"><i class="fas fa-link"></i></span>
                    <input type="text" class="form-control bg-light text-muted" 
                           id="cat_slug" name="codigo_slug" 
                           placeholder="turismo-religioso" 
                           style="height: 100%;"
                           readonly required>
                </div>
            </div>

                      <button type="submit" class="btn boton bt-body">
             <i class="fas fa-save me-2"></i>Guardar
          </button>
        </div>
        

        <div class="modal-footer custom-modal-footer d-flex justify-content-between">
          <button type="button" class="btn btn-warning" data-bs-dismiss="modal">
            Cancelar
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

{% endblock %}

<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        // --- 1. LÓGICA DE LIMPIEZA AL CERRAR ---
        const modalCatEl = document.getElementById('categoriaModal');
        modalCatEl.addEventListener('hidden.bs.modal', function (event) {
            const form = document.getElementById('categoriaForm');
            if (form) {
                form.reset();
                form.classList.remove('was-validated');
            }
        });

        // --- 2. FOCO AUTOMÁTICO AL ABRIR ---
        modalCatEl.addEventListener('shown.bs.modal', function () {
            document.getElementById('cat_nombre').focus();
        });

        // --- FUNCIÓN PARA MOSTRAR ALERTAS PERSONALIZADAS ---
        function showCustomAlert(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 12px;
                color: white;
                z-index: 10000;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                animation: slideInRight 0.3s ease-out;
                font-family: inherit;
                display: flex;
                align-items: center;
                gap: 10px;
                max-width: 350px;
            `;
            
            if (type === 'success') {
                toast.style.backgroundColor = '#2ecc71';
            } else if (type === 'error') {
                toast.style.backgroundColor = '#e74c3c';
            } else {
                toast.style.backgroundColor = 'var(--color-naranja, #ff8c00)';
            }
            
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle';
            
            toast.innerHTML = `
                <i class="fas fa-${icon} fa-lg"></i>
                <div style="flex-grow: 1;">${message}</div>
                <button type="button" style="background: none; border: none; color: white; cursor: pointer; padding: 0;" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            document.body.appendChild(toast);
            
            // Asegurar animaciones
            if (!document.querySelector('#toastAnimations')) {
                const style = document.createElement('style');
                style.id = 'toastAnimations';
                style.textContent = `
                    @keyframes slideInRight {
                        from { transform: translateX(100%); opacity: 0; }
                        to { transform: translateX(0); opacity: 1; }
                    }
                    @keyframes slideOutRight {
                        from { transform: translateX(0); opacity: 1; }
                        to { transform: translateX(100%); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.3s ease-in';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- 3. ENVÍO AJAX ---
        const formCategoria = document.getElementById('categoriaForm');
        formCategoria.addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const formData = new FormData(this);
            const urlDestino = this.action;

            fetch(urlDestino, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Error en la red');
                return response.json();
            })
            .then(data => {
                if (data.status === 'success') {
                    // Cerrar el modal usando la instancia de Bootstrap
                    const modalInstance = bootstrap.Modal.getInstance(modalCatEl);
                    modalInstance.hide();
                    
                    showCustomAlert("Categoría creada con éxito.", "success");
                    
                    // Agregar la nueva categoría al selector y seleccionarla
                    const selectCategoria = document.getElementById('select_categoria_bd') || document.getElementById('id_categoria');
                    if (selectCategoria) {
                        const option = document.createElement('option');
                        option.value = data.new_id;
                        option.textContent = data.new_name;
                        option.selected = true;
                        selectCategoria.appendChild(option);
                    }
                } else {
                    showCustomAlert(data.message || 'Error al crear la categoría.', "error");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showCustomAlert("Error: " + error.message, "error");
            });
        });
    });

    // --- 4. GENERADOR DE SLUG ---
    // Esta función debe estar fuera del DOMContentLoaded para que el onkeyup del HTML la encuentre
    function generarSlugAuto() {
        const nombreInput = document.getElementById('cat_nombre');
        const slugInput = document.getElementById('cat_slug');
        
        let texto = nombreInput.value;
        let slug = texto
            .toLowerCase()
            .trim()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-z0-9\s-]/g, '')
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-');

        slugInput.value = slug;
    }

    // --- 5. ABRIR MODAL SIN CERRAR EL ANTERIOR ---
    window.abrirModalCategoriaSinCerrar = function() {
        const modalCatEl = document.getElementById('categoriaModal');
        let modal = bootstrap.Modal.getInstance(modalCatEl);
        if (!modal) {
            modal = new bootstrap.Modal(modalCatEl);
        }
        modal.show();
    };
</script>
