<style>
  /* --- Estilos para la Galería (Drag & Drop) --- */
  .gallery-dropzone {
      border: 2px dashed #dee2e6;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      background: #f8f9fa;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
  }
  .gallery-dropzone:hover { 
      border-color: var(--color-naranja, #e67e22); 
      background: #fffdfa; 
  }
  .gallery-dropzone i { font-size: 2.5rem; color: #6c757d; margin-bottom: 10px; }
  .preview-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
  .preview-item {
      width: 100px; height: 100px; position: relative; border-radius: 8px;
      overflow: hidden; border: 1px solid #dee2e6; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }
  .preview-remove {
      position: absolute; top: 2px; right: 2px; background: rgba(220, 53, 69, 0.9); 
      color: white; border: none; width: 20px; height: 20px; border-radius: 50%;
      font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .preview-remove:hover { background: rgb(220, 53, 69); }

  /* Estilos del Modal */
  .conditional-section-punto { animation: fadeIn 0.4s ease-in-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  #modalEdicionPunto .modal-content { max-height: 90vh; height: 90vh; padding: 0; }
  #modalEdicionPunto .modal-body { overflow-y: auto; flex-grow: 1; padding: 1.25rem; }
  #formPunto { display: flex; flex-direction: column; height: 100%; }
</style>

<div class="modal fade" id="modalEdicionPunto" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      
      <form id="formPunto" onsubmit="guardarEdicionPunto(event)" class="d-flex flex-column h-100">
        
        <div class="modal-header bg-light">
          <h5 class="modal-title fw-bold text-primary"><i class="fas fa-edit me-2"></i> Editar Punto de Interés</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        
        <div class="modal-body">
            <input type="hidden" id="edit_id_punto" name="id_punto">
            
            <div class="row">
                <div class="col-md-8 mb-3">
                    <label class="form-label fw-bold">Nombre del Lugar *</label>
                    <input type="text" class="form-control" id="edit_nombre" name="nombre_punto" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Categoría *</label>
                    <select class="form-select border-primary" id="edit_categoria" name="categoria" required onchange="cambiarCategoriaPunto(this.value)">
                        <option value="ofrenda">Ofrenda</option>
                        <option value="sitio_turistico">Sitio Turístico</option>
                        <option value="servicio">Servicio</option>
                    </select>
                </div>
            </div>
            

            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <textarea class="form-control" id="edit_descripcion" name="descripcion" rows="3"></textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Imagen de Portada (URL)</label>
                <input type="url" class="form-control" id="edit_imagen_portada" name="imagen_portada">
            </div>

            <h6 class="border-bottom pb-2 mt-4 text-secondary"><i class="far fa-calendar-alt me-1"></i> Fechas y Horarios</h6>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label small fw-bold">Fecha Inicio</label>
                    <input type="date" class="form-control" id="edit_fecha_inicio" name="fecha_inicio">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label small fw-bold">Fecha Fin</label>
                    <input type="date" class="form-control" id="edit_fecha_fin" name="fecha_fin">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label small fw-bold">Apertura</label>
                    <input type="time" class="form-control" id="edit_hora_apertura" name="hora_apertura">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label small fw-bold">Cierre</label>
                    <input type="time" class="form-control" id="edit_hora_cierre" name="hora_cierre">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">Días de Operación</label>
                <div class="d-flex flex-wrap gap-2 bg-white p-2 border rounded">
                    <div class="form-check form-check-inline"><input type="checkbox" class="form-check-input chk-dia" name="dias_semana" value="lunes"> <label>Lun</label></div>
                    <div class="form-check form-check-inline"><input type="checkbox" class="form-check-input chk-dia" name="dias_semana" value="martes"> <label>Mar</label></div>
                    <div class="form-check form-check-inline"><input type="checkbox" class="form-check-input chk-dia" name="dias_semana" value="miercoles"> <label>Mié</label></div>
                    <div class="form-check form-check-inline"><input type="checkbox" class="form-check-input chk-dia" name="dias_semana" value="jueves"> <label>Jue</label></div>
                    <div class="form-check form-check-inline"><input type="checkbox" class="form-check-input chk-dia" name="dias_semana" value="viernes"> <label>Vie</label></div>
                    <div class="form-check form-check-inline"><input type="checkbox" class="form-check-input chk-dia" name="dias_semana" value="sabado"> <label>Sáb</label></div>
                    <div class="form-check form-check-inline"><input type="checkbox" class="form-check-input chk-dia" name="dias_semana" value="domingo"> <label>Dom</label></div>
                </div>
            </div>

            <!-- Galería Multimedia por URL -->
            <div class="mb-3">
                <label class="form-label small fw-bold"><i class="fas fa-images me-1"></i> Galería Multimedia</label>

                <!-- Fotos existentes en BD -->
                <div id="galeriaExistente" class="preview-container mb-2"></div>

                <!-- Agregar nueva URL -->
                <div class="input-group mb-2">
                    <input type="url" id="inputNuevaUrlGaleria" class="form-control"
                        placeholder="https://... URL de imagen o video">
                    <button type="button" class="btn btn-outline-primary" onclick="agregarUrlGaleria()">
                        <i class="fas fa-plus"></i> Agregar
                    </button>
                </div>
                <!-- URLs nuevas pendientes (se envían al servidor) -->
                <div id="listaUrlsNuevas"></div>
                <small class="text-muted">Soporta imágenes (jpg, png, webp…) y videos (mp4, webm…)</small>
            </div>

            <div id="campos_ofrenda_punto" class="conditional-section-punto" style="display:none;">
                <hr>
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre del Anfitrión</label>
                    <input type="text" class="form-control" id="edit_anfitrion" name="anfitrion" placeholder="Familia o persona responsable">
                </div>
            </div>

            <div id="campos_servicio_punto" class="conditional-section-punto" style="display:none;">
                <hr>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Tipo Servicio</label>
                        <select class="form-select" id="edit_tipo_servicio" name="tipo_servicio">
                            <option value="hospedaje">Hospedaje</option>
                            <option value="cajero">Cajero / Banco</option>
                            <option value="modulo">Módulo de Información</option>
                            <option value="salud">Salud / Farmacia</option>
                            <option value="alimentacion">Alimentación</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Contacto</label>
                        <input type="text" class="form-control" id="edit_contacto_servicio" name="contacto_servicio" placeholder="Tel, Email o Web">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Métodos de Pago</label>
                    <div class="d-flex gap-3 flex-wrap">
                        <div class="form-check"><input class="form-check-input chk-pago" type="checkbox" name="tipo_pago" value="efectivo"> <label>Efectivo</label></div>
                        <div class="form-check"><input class="form-check-input chk-pago" type="checkbox" name="tipo_pago" value="tarjeta"> <label>Tarjeta</label></div>
                        <div class="form-check"><input class="form-check-input chk-pago" type="checkbox" name="tipo_pago" value="transferencia"> <label>Transferencia</label></div>
                    </div>
                </div>
            </div>

            <div id="campos_sitio_punto" class="conditional-section-punto" style="display:none;">
                <hr>
                
                <div class="mb-3">
                  <label class="fw-bold form-label">Categoría del Sitio *</label>
                  <div class="input-group">
                    <select class="form-select" id="select_categoria_bd" name="id_categoria_bd">
                      <option value="">-- Selecciona una categoría --</option>
                      {% for cat in categorias %}
                        <option value="{{ cat.id_categoria }}">{{ cat.nombre }}</option>
                      {% endfor %}
                    </select>
                    <button class="btn btn-outline-secondary" type="button" onclick="abrirModalCategoria()">
                      <i class="fas fa-plus"></i> Crear nueva
                    </button>
                  </div>
                </div>
                <div class="mb-3">
                    <label class="fw-bold form-label">Reglas de Acceso / Restricciones</label>
                    <textarea class="form-control" id="edit_reglas_acceso" name="reglas_acceso" rows="2" placeholder="Ej: No mascotas..."></textarea>
                </div>
            </div>

        </div> <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i> Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
    let dtPunto = new DataTransfer();

    // =============================================
    // ABRIR MODAL Y CARGAR DATOS DEL PUNTO
    // =============================================
    function abrirModalEdicionPunto(id) {
        fetch(`/puntos/detalle/${id}/`)
            .then(res => res.json())
            .then(data => {
                if (!data.success) { showToast(data.error, 'error'); return; }

                const form = document.getElementById('formPunto');
                form.reset();
                dtPunto = new DataTransfer();
                actualizarPreviewPunto();

                document.getElementById('edit_id_punto').value = data.id_punto || '';
                document.getElementById('edit_nombre').value = data.nombre || '';
                document.getElementById('edit_categoria').value = data.categoria || '';
                cambiarCategoriaPunto(data.categoria || '');
                document.getElementById('edit_descripcion').value = data.descripcion || '';
                document.getElementById('edit_imagen_portada').value = data.imagen_portada || '';
                document.getElementById('edit_fecha_inicio').value = data.fecha_inicio || '';
                document.getElementById('edit_fecha_fin').value = data.fecha_fin || '';
                document.getElementById('edit_hora_apertura').value = data.hora_apertura || '';
                document.getElementById('edit_hora_cierre').value = data.hora_cierre || '';

                form.querySelectorAll('.chk-dia').forEach(cb => cb.checked = false);
                if (data.dias_semana) {
                    data.dias_semana.forEach(dia => {
                        const check = form.querySelector(`.chk-dia[value="${dia.trim()}"]`);
                        if (check) check.checked = true;
                    });
                }

                if (data.categoria === 'ofrenda') {
                    document.getElementById('edit_anfitrion').value = data.anfitrion || '';
                } else if (data.categoria === 'sitio_turistico') {
                    document.getElementById('edit_reglas_acceso').value = data.reglas_acceso || '';
                    const selectCatBD = document.getElementById('select_categoria_bd');
                    if (selectCatBD) selectCatBD.value = data.id_categoria_bd || '';
                } else if (data.categoria === 'servicio') {
                    document.getElementById('edit_tipo_servicio').value = data.tipo_servicio || 'modulo';
                    document.getElementById('edit_contacto_servicio').value = data.contacto_servicio || '';
                    form.querySelectorAll('.chk-pago').forEach(cb => cb.checked = false);
                    if (data.tipo_pago) {
                        data.tipo_pago.forEach(pago => {
                            const check = form.querySelector(`.chk-pago[value="${pago.trim()}"]`);
                            if (check) check.checked = true;
                        });
                    }
                }

                cargarGaleriaExistente(data.galeria || []);
                document.getElementById('listaUrlsNuevas').innerHTML = '';
                document.getElementById('inputNuevaUrlGaleria').value = '';

                new bootstrap.Modal(document.getElementById('modalEdicionPunto')).show();
            })
            .catch(err => { console.error(err); showToast('Error cargando datos del punto', 'error'); });
    }

    // =============================================
    // GALERÍA EXISTENTE (cargada desde la BD)
    // =============================================
    function cargarGaleriaExistente(items) {
        const cont = document.getElementById('galeriaExistente');
        cont.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.style.position = 'relative';

            if (item.tipo === 'imagen') {
                div.innerHTML = `<img src="${item.url}" style="width:100%;height:100%;object-fit:cover;">`;
            } else {
                div.innerHTML = `<div class="d-flex align-items-center justify-content-center bg-dark text-white w-100 h-100"><i class="fas fa-video fa-2x"></i></div>`;
            }

            const inp = document.createElement('input');
            inp.type = 'hidden';
            inp.name = 'galeria_eliminar';
            inp.value = item.id;
            inp.disabled = true;
            inp.dataset.id = item.id;
            div.appendChild(inp);

            const btn = document.createElement('button');
            btn.className = 'preview-remove';
            btn.type = 'button';
            btn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            btn.style.cssText = 'background:rgba(220,53,69,0.9);color:#fff;border:none;width:22px;height:22px;border-radius:50%;position:absolute;top:2px;right:2px;cursor:pointer;';
            btn.onclick = function() {
                inp.disabled = false;
                div.style.opacity = '0.35';
                btn.disabled = true;
            };
            div.appendChild(btn);
            cont.appendChild(div);
        });
    }

    // =============================================
    // AGREGAR NUEVA URL A LA GALERÍA
    // =============================================
    function agregarUrlGaleria() {
        const input = document.getElementById('inputNuevaUrlGaleria');
        const url = input.value.trim();
        if (!url) { showToast('Ingresa una URL válida', 'error'); return; }

        const cont = document.getElementById('listaUrlsNuevas');

        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.name = 'galeria_url_nueva';
        hiddenInput.value = url;

        const esVideo = /\.(mp4|webm|avi|mov)(\?|$)/i.test(url);
        const preview = document.createElement('div');
        preview.className = 'd-flex align-items-center gap-2 mb-1 p-1 border rounded bg-light';
        preview.innerHTML = esVideo
            ? `<i class="fas fa-film text-primary"></i>`
            : `<img src="${url}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;" onerror="this.src=''" >`;

        const span = document.createElement('span');
        span.className = 'small text-truncate flex-grow-1';
        span.style.maxWidth = '300px';
        span.textContent = url;

        const btnDel = document.createElement('button');
        btnDel.type = 'button';
        btnDel.className = 'btn btn-sm btn-outline-danger py-0 px-1';
        btnDel.innerHTML = '<i class="fas fa-times"></i>';
        btnDel.onclick = function() {
            preview.remove();
            hiddenInput.remove();
        };

        preview.appendChild(span);
        preview.appendChild(btnDel);
        cont.appendChild(hiddenInput);
        cont.appendChild(preview);

        input.value = '';
    }

    // =============================================
    // GUARDAR EDICIÓN
    // =============================================
    function guardarEdicionPunto(e) {
        e.preventDefault();
        const id = document.getElementById('edit_id_punto').value;
        const formEl = document.getElementById('formPunto');
        const formData = new FormData(formEl);

        for (let i = 0; i < dtPunto.files.length; i++) {
            formData.append('galeria_multimedia_nuevos', dtPunto.files[i]);
        }

        fetch(`/puntos/editar/${id}/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': getCookie('csrftoken') },
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showToast(data.message, 'success');
                setTimeout(() => location.reload(), 1000);
            } else {
                showToast(data.error, 'error');
            }
        })
        .catch(err => { console.error(err); showToast('Error al guardar', 'error'); });
    }

    // =============================================
    // MOSTRAR/OCULTAR SECCIONES CONDICIONALES
    // =============================================
    function cambiarCategoriaPunto(categoria) {
        document.querySelectorAll('.conditional-section-punto').forEach(el => el.style.display = 'none');
        if (categoria === 'ofrenda') {
            document.getElementById('campos_ofrenda_punto').style.display = 'block';
        } else if (categoria === 'sitio_turistico') {
            document.getElementById('campos_sitio_punto').style.display = 'block';
        } else if (categoria === 'servicio') {
            document.getElementById('campos_servicio_punto').style.display = 'block';
        }
    }

    // =============================================
    // LÓGICA DE GALERÍA DEL MODAL DE PUNTOS
    // =============================================
    const inputGaleriaPunto = document.getElementById('inputGaleriaPunto');
    if (inputGaleriaPunto) {
        inputGaleriaPunto.addEventListener('change', function() {
            for (let i = 0; i < this.files.length; i++) {
                let exists = false;
                for (let j = 0; j < dtPunto.files.length; j++) {
                    if (dtPunto.files[j].name === this.files[i].name) exists = true;
                }
                if (!exists) dtPunto.items.add(this.files[i]);
            }
            this.files = dtPunto.files;
            actualizarPreviewPunto();
        });
    }

    function actualizarPreviewPunto() {
        const previewContainer = document.getElementById('previewGaleriaPunto');
        if (!previewContainer) return;
        previewContainer.innerHTML = '';

        for (let i = 0; i < dtPunto.files.length; i++) {
            const file = dtPunto.files[i];
            const reader = new FileReader();
            const item = document.createElement('div');
            item.className = 'preview-item';

            const btnRemove = document.createElement('button');
            btnRemove.className = 'preview-remove';
            btnRemove.innerHTML = '<i class="fas fa-times"></i>';
            btnRemove.type = 'button';
            btnRemove.onclick = function() {
                const newDt = new DataTransfer();
                for (let j = 0; j < dtPunto.files.length; j++) {
                    if (j !== i) newDt.items.add(dtPunto.files[j]);
                }
                dtPunto = newDt;
                if (inputGaleriaPunto) inputGaleriaPunto.files = dtPunto.files;
                actualizarPreviewPunto();
            };

            reader.onload = function(e) {
                if (file.type.startsWith('image/')) {
                    item.innerHTML = `<img src="${e.target.result}">`;
                } else {
                    item.innerHTML = `<div class="d-flex align-items-center justify-content-center bg-dark text-white w-100 h-100"><i class="fas fa-video fa-2x"></i></div>`;
                }
                item.appendChild(btnRemove);
                previewContainer.appendChild(item);
            };
            reader.readAsDataURL(file);
        }
    }
</script>
