<form id="editDocumentForm" method="POST" enctype="multipart/form-data" action="{% url 'editar_documento' documento.id %}">
    {% csrf_token %}
    
    <div class="modal-body p-4">
        
        <div class="mb-3">
            <label class="form-label fw-bold">Título <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="titulo" value="{{ documento.titulo }}" 
                   required maxlength="200" minlength="3">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Reemplazar o subir Archivo Físico</label>
            {% if documento.archivo %}
                <div class="alert alert-info py-2 px-3 mb-2" style="font-size: 0.9rem;">
                    <i class="fas fa-file me-2"></i><strong>Archivo actual:</strong> 
                    <a href="{{ documento.archivo.url }}" target="_blank" class="text-decoration-none">{{ documento.archivo.name }}</a>
                </div>
            {% endif %}
            <input type="file" class="form-control" name="archivo">
            <small class="form-text text-muted">Deja este campo vacío si deseas mantener el archivo actual o usar solo una URL externa.</small>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">URL del documento</label>
            <input type="url" class="form-control" name="url" value="{{ documento.url|default:'' }}" 
                   placeholder="https://ejemplo.com/documento.pdf">
            <small class="form-text text-muted">Enlace externo de respaldo. Se ignorará si se sube un nuevo archivo físico.</small>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Categoría del Repositorio</label>
            <select class="form-select" name="categoria">
                <option value="">General (Sin categoría)</option>
                {% for cat in categorias %}
                    <option value="{{ cat.id }}" {% if documento.categoria_id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Descripción</label>
            <textarea class="form-control" name="descripcion" rows="3">{{ documento.descripcion|default:'' }}</textarea>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Clasificación <span class="text-danger">*</span></label>
                <select class="form-select" name="clasificacion" required>
                    <option value="publico" {% if documento.clasificacion == 'publico' %}selected{% endif %}>Público</option>
                    <option value="privado" {% if documento.clasificacion == 'privado' %}selected{% endif %}>Privado</option>
                    <option value="confidencial" {% if documento.clasificacion == 'confidencial' %}selected{% endif %}>Confidencial</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Tipo de Archivo <span class="text-danger">*</span></label>
                <select class="form-select" name="tipo" required>
                    {% if tipos_choices %}
                        {% for valor, nombre in tipos_choices %}
                            <option value="{{ valor }}" {% if documento.tipo == valor %}selected{% endif %}>
                                {{ nombre }}
                            </option>
                        {% endfor %}
                    {% else %}
                        <option value="reporte" {% if documento.tipo == 'reporte' %}selected{% endif %}>Reporte</option>
                        <option value="video" {% if documento.tipo == 'video' %}selected{% endif %}>Video</option>
                        <option value="historico" {% if documento.tipo == 'historico' %}selected{% endif %}>Documento Histórico</option>
                    {% endif %}
                </select>
            </div>
        </div>
        <button type="submit" class="btn boton bt-body">
            <i class="fas fa-save me-2"></i>Guardar Cambios
        </button>

    </div> 
    
    <div class="modal-footer custom-modal-footer">
        <button type="button" class="btn btn-warning me-2" data-bs-dismiss="modal">Cancelar</button>
    </div>

</form>
