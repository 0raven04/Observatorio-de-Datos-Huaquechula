{% load static %}
<form id="editDocumentForm" method="POST" enctype="multipart/form-data" action="{% url 'editar_documento' documento.id_documento %}">
    {% csrf_token %}

    <div class="container p-3">
         <div class="row">
            <div class="col-md-12 mb-3">
                <label class="form-label fw-bold">Archivo local (reemplaza el actual)</label>
                <input type="file" name="archivo" class="form-control" accept="application/pdf,image/*,video/*,audio/*">
                {% if documento.archivo %}
                    <small class="form-text text-muted">Archivo actual: <a href="{{ documento.archivo.url }}" target="_blank">Ver</a></small>
                {% endif %}
            </div>
        </div>
        <div class="row">
            
            <div class="col-md-8 mb-3">
                <label class="form-label fw-bold">Título <span class="text-danger">*</span></label>
                <input type="text" name="titulo" class="form-control" required maxlength="200" value="{{ documento.titulo }}">
            </div>
            
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Descripción</label>
            <textarea name="descripcion" class="form-control" rows="3">{{ documento.descripcion }}</textarea>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Tipo</label>
                <select name="tipo" class="form-select">
                    {% for val, label in tipos_choices %}
                        <option value="{{ val }}" {% if documento.tipo == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Clasificación</label>
                <select name="clasificacion" class="form-select">
                    {% for val, label in clasificacion_choices %}
                        <option value="{{ val }}" {% if documento.clasificacion == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>


            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Categoría</label>
                <select name="categoria" class="form-select">
                    <option value="">-- Ninguna --</option>
                    {% for cat in categorias %}
                        <option value="{{ cat.id }}" {% if documento.categoria and documento.categoria.id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

       

        <div class="d-flex justify-content-end gap-2 mt-3">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn boton bt-body">Guardar cambios</button>
        </div>
    </div>
</form>
